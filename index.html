  <!-- Custom CSS with Performance Optimizations -->
  <style>
    /* SEO Feature 10: Performance optimizations via hardware acceleration reduces bounce rate */
    @keyframes gradient-x {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translate3d(0px, 0px, 0) scale(1); }
      50% { transform: translate3d(0px, -15px, 0) scale(1.02); }
    }
    @keyframes float-delayed {
      0%, 100% { transform: translate3d(0px, 0px, 0) scale(1); }
      50% { transform: translate3d(0px, 15px, 0) scale(0.98); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; filter: blur(40px); }
      50% { opacity: 0.7; filter: blur(60px); }
    }
    @keyframes ambient-bg {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    
    .animate-gradient-x {
      background-size: 200% 200%;
      animation: gradient-x 4s ease infinite;
      will-change: background-position;
    }
    .animate-ambient-bg {
      background-size: 200% 200%;
      animation: ambient-bg 15s ease-in-out infinite;
    }
    /* Hardware acceleration added to prevent mobile lag */
    .animate-float {
      animation: float 6s ease-in-out infinite;
      will-change: transform;
    }
    .animate-float-delayed {
      animation: float-delayed 8s ease-in-out infinite;
      will-change: transform;
    }
    .animate-pulse-glow {
      animation: pulse-glow 5s ease-in-out infinite;
      will-change: opacity, filter;
    }
    
    /* Enhanced Light Mode Grid Pattern */
    .bg-grid-pattern {
      background-image: linear-gradient(to right, rgba(99, 102, 241, 0.08) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    /* Maintained Original Dark Mode Grid Pattern */
    .dark .bg-grid-pattern {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    /* NEW ANIMATIONS FOR ENHANCED UX */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    
    @keyframes shine {
      0% { left: -100%; }
      20%, 100% { left: 200%; }
    }
    .animate-shine::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      transform: skewX(-20deg);
      animation: shine 3s infinite;
      z-index: 20;
      pointer-events: none;
    }

    /* PC specific glow enhancements */
    @media (min-width: 768px) {
      .animate-pulse-glow {
        animation: pulse-glow-pc 6s ease-in-out infinite;
      }
      @keyframes pulse-glow-pc {
        0%, 100% { opacity: 0.5; filter: blur(80px); }
        50% { opacity: 0.8; filter: blur(120px); }
      }
    }
  </style>
</head>

  <!-- Vanilla JavaScript functionality -->
  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // Dark Mode Toggle Logic
    const htmlElement = document.documentElement;
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const sunIconWrapper = document.getElementById('sunIconWrapper');
    const moonIconWrapper = document.getElementById('moonIconWrapper');

    // Default is dark mode based on the initial HTML class setup
    let isDarkMode = true;

    themeToggleBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      
      if (isDarkMode) {
        // Switch to Dark Mode
        htmlElement.classList.add('dark');
        themeToggleBtn.setAttribute('aria-label', 'Switch to Light Mode');
        sunIconWrapper.classList.add('hidden');
        moonIconWrapper.classList.remove('hidden');
      } else {
        // Switch to Light Mode
        htmlElement.classList.remove('dark');
        themeToggleBtn.setAttribute('aria-label', 'Switch to Dark Mode');
        sunIconWrapper.classList.remove('hidden');
        moonIconWrapper.classList.add('hidden');
      }
    });
  </script>
