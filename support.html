<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <script>
if(localStorage.getItem("maintenance") === "on"){
window.location.href = "maintenance.html";
}
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Money Mage | Support Us</title>
  <meta name="description" content="Support the development of Money Mage to keep your financial tracking magical and free.">
  <meta name="theme-color" content="#4f46e5">

  <!-- Tailwind CSS Configuration -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'slide-in-right': 'slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            slideInRight: {
              '0%': { transform: 'translateX(100%)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            }
          }
        },
      },
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS matching the Dashboard -->
  <style>
    @keyframes gradient-x {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    @keyframes float {
      0%, 100% { transform: translate3d(0px, 0px, 0) scale(1); }
      50% { transform: translate3d(0px, -15px, 0) scale(1.02); }
    }
    @keyframes float-delayed {
      0%, 100% { transform: translate3d(0px, 0px, 0) scale(1); }
      50% { transform: translate3d(0px, 15px, 0) scale(0.98); }
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; filter: blur(40px); }
      50% { opacity: 0.7; filter: blur(60px); }
    }
    @keyframes ambient-bg {
      0%, 100% { background-position: 0% 0%; }
      50% { background-position: 100% 100%; }
    }
    
    .animate-gradient-x {
      background-size: 200% 200%;
      animation: gradient-x 4s ease infinite;
      will-change: background-position;
    }
    .animate-ambient-bg {
      background-size: 200% 200%;
      animation: ambient-bg 15s ease-in-out infinite;
    }
    .animate-float {
      animation: float 6s ease-in-out infinite;
      will-change: transform;
    }
    .animate-float-delayed {
      animation: float-delayed 8s ease-in-out infinite;
      will-change: transform;
    }
    .animate-pulse-glow {
      animation: pulse-glow 5s ease-in-out infinite;
      will-change: opacity, filter;
    }
    
    .bg-grid-pattern {
      background-image: linear-gradient(to right, rgba(99, 102, 241, 0.08) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .dark .bg-grid-pattern {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .dark .glass-card {
      background: rgba(15, 23, 42, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(51, 65, 85, 0.5);
    }

    .hover-lift { transition: all 0.3s ease; }
    .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
  </style>
</head>

<body class="min-h-screen transition-colors duration-500 bg-gradient-to-br from-indigo-50 via-white to-fuchsia-50 dark:bg-none dark:bg-slate-950 text-slate-900 dark:text-white overflow-x-hidden relative font-sans selection:bg-fuchsia-500/30 dark:selection:bg-fuchsia-500/40 animate-ambient-bg flex flex-col">

  <!-- Background Grid Pattern -->
  <div class="fixed inset-0 bg-grid-pattern z-0 opacity-60 dark:opacity-20 transition-opacity duration-500 pointer-events-none"></div>
  <div class="fixed inset-0 bg-gradient-to-b from-transparent via-transparent to-white/50 dark:to-slate-950 z-0 pointer-events-none"></div>

  <!-- Magical Floating Glowing Orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0 flex items-center justify-center">
    <div class="absolute top-[5%] left-[5%] w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-violet-400/30 dark:bg-violet-600/15 rounded-full filter blur-2xl md:blur-[80px] animate-float transition-colors duration-500" style="transform: translateZ(0)"></div>
    <div class="absolute top-[15%] right-[-5%] w-[50vw] h-[50vw] max-w-[350px] max-h-[350px] bg-fuchsia-400/30 dark:bg-fuchsia-600/15 rounded-full filter blur-2xl md:blur-[70px] animate-float-delayed transition-colors duration-500" style="transform: translateZ(0)"></div>
    <div class="absolute bottom-[-5%] left-[20%] w-[70vw] h-[70vw] max-w-[600px] max-h-[600px] bg-indigo-400/30 dark:bg-indigo-600/15 rounded-full filter blur-3xl md:blur-[100px] animate-pulse-glow transition-colors duration-500" style="transform: translateZ(0)"></div>
  </div>
  
  <!-- Navigation -->
  <nav class="fixed w-full z-50 top-0 transition-all duration-300 bg-white/60 dark:bg-slate-950/70 backdrop-blur-xl md:backdrop-blur-2xl border-b border-indigo-100/50 dark:border-slate-800/40 shadow-[0_2px_20px_rgba(99,102,241,0.05)] dark:shadow-none">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20 sm:h-24">
        
        <!-- Logo -->
        <a href="index.html" class="flex items-center gap-2 sm:gap-3 group cursor-pointer" title="Money Mage - Home">
          <div class="flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl bg-gradient-to-br from-indigo-500 to-fuchsia-500 shadow-lg shadow-indigo-500/30 dark:shadow-none text-white transition-transform duration-500 group-hover:scale-105 group-hover:rotate-3">
            <i data-lucide="wallet" class="w-6 h-6 sm:w-7 sm:h-7"></i>
          </div>
          <span class="text-xl sm:text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 via-violet-600 to-fuchsia-600 dark:from-indigo-300 dark:via-violet-300 dark:to-fuchsia-300 hidden sm:block">
            Money Mage
          </span>
        </a>
        
        <!-- Navigation Actions -->
        <div class="flex items-center gap-3 sm:gap-6">
          <a href="index.html" class="text-sm font-bold text-slate-600 dark:text-slate-300 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors flex items-center gap-2">
            <i data-lucide="home" class="w-4 h-4"></i> <span class="hidden sm:inline">Home</span>
          </a>
          <a href="service.html" class="text-sm font-bold text-slate-600 dark:text-slate-300 hover:text-fuchsia-600 dark:hover:text-fuchsia-400 transition-colors flex items-center gap-2">
            <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="hidden sm:inline">Dashboard</span>
          </a>

          <!-- Dark Mode Toggle -->
          <button 
            id="themeToggleBtn"
            class="relative flex items-center justify-center w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-indigo-50 dark:bg-slate-800/50 text-indigo-600 dark:text-amber-300 hover:bg-indigo-100 dark:hover:bg-slate-700 transition-all duration-300 shadow-sm border border-indigo-100 dark:border-slate-700 active:scale-95 ml-1 sm:ml-2"
            aria-label="Toggle Theme"
          >
            <span id="sunIconWrapper" class="hidden"><i data-lucide="sun" class="w-5 h-5 sm:w-[22px] sm:h-[22px] text-amber-500"></i></span>
            <span id="moonIconWrapper"><i data-lucide="moon" class="w-5 h-5 sm:w-[22px] sm:h-[22px] text-indigo-600"></i></span>
          </button>
        </div>

      </div>
    </div>
  </nav>
  
  <!-- Main Support Content -->
  <main class="relative z-10 pt-32 pb-20 px-4 w-full flex-grow flex items-center justify-center min-h-[calc(100vh-100px)]">
    
    <div class="glass-card w-full max-w-2xl mx-auto rounded-[2rem] p-8 sm:p-12 shadow-2xl relative overflow-hidden animate-fade-in-up hover-lift">
      
      <!-- Decorative Inner Blurs -->
      <div class="absolute -right-12 -top-12 w-48 h-48 bg-gradient-to-br from-pink-500/20 to-fuchsia-500/20 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute -left-12 -bottom-12 w-48 h-48 bg-gradient-to-tr from-indigo-500/20 to-violet-500/20 rounded-full blur-3xl pointer-events-none"></div>

      <!-- Icon Header -->
      <div class="flex justify-center mb-6 relative z-10">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-gradient-to-br from-pink-100 to-fuchsia-100 dark:from-pink-900/40 dark:to-fuchsia-900/40 text-pink-600 dark:text-pink-400 shadow-inner border border-pink-200/50 dark:border-pink-700/50">
          <i data-lucide="heart-handshake" class="w-10 h-10"></i>
        </div>
      </div>

      <!-- Text Content -->
      <div class="text-center mb-10 relative z-10">
        <h1 class="text-3xl sm:text-5xl font-black tracking-tight text-slate-800 dark:text-white mb-4">
          Support the Magic
        </h1>
        <p class="text-base sm:text-lg text-slate-600 dark:text-slate-300 max-w-lg mx-auto font-medium leading-relaxed">
          Money Mage is designed to help you build wealth, ad-free. If this magical tool has brought clarity to your finances, consider fueling our magic by making a donation!
        </p>
      </div>

      <!-- QR Code Section -->
      <div class="flex flex-col items-center justify-center mb-10 relative z-10">
        <div class="bg-white p-4 sm:p-5 rounded-3xl shadow-[0_10px_40px_-10px_rgba(236,72,153,0.3)] transform transition-transform hover:scale-105 duration-300 border-2 border-pink-100 dark:border-transparent">
          <!-- The QR image container is strictly white so that it scans easily regardless of dark mode -->
          <div class="rounded-xl overflow-hidden bg-white w-48 h-48 sm:w-56 sm:h-56 flex items-center justify-center">
            <img 
              src="https://lh3.googleusercontent.com/p/AF1QipO-K-wZ9PnvHBjDX8l8y_LIlVJUUtVUt57XFLik=w243-h244-n-k-no-nu" 
              alt="Scan QR Code to Support" 
              class="w-full h-full object-contain"
            >
          </div>
        </div>
        <div class="mt-5 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-pink-50 dark:bg-pink-900/30 text-pink-700 dark:text-pink-300 font-bold text-sm border border-pink-100 dark:border-pink-800/50">
          <i data-lucide="scan" class="w-4 h-4"></i> Scan to Donate
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center items-center w-full max-w-md mx-auto relative z-10">
        <a href="service.html" class="w-full flex items-center justify-center gap-2 px-6 py-4 rounded-2xl font-bold text-slate-700 dark:text-slate-200 bg-white/50 dark:bg-slate-800/50 hover:bg-white dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 transition-all transform hover:-translate-y-1 shadow-sm backdrop-blur-md">
          <i data-lucide="arrow-left" class="w-5 h-5 text-slate-500 dark:text-slate-400"></i> Back to Dashboard
        </a>
      </div>

    </div>
  </main>

  <!-- Script logic for Dark Mode and Icons -->
  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    /* --- THEME TOGGLE LOGIC --- */
    const htmlElement = document.documentElement;
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const sunIconWrapper = document.getElementById('sunIconWrapper');
    const moonIconWrapper = document.getElementById('moonIconWrapper');
    
    // Default as requested
    let isDarkMode = true; 

    themeToggleBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        htmlElement.classList.add('dark');
        themeToggleBtn.setAttribute('aria-label', 'Switch to Light Mode');
        sunIconWrapper.classList.add('hidden');
        moonIconWrapper.classList.remove('hidden');
      } else {
        htmlElement.classList.remove('dark');
        themeToggleBtn.setAttribute('aria-label', 'Switch to Dark Mode');
        sunIconWrapper.classList.remove('hidden');
        moonIconWrapper.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
